<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Olli's Corner — Accesso (anteprima)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  :root {
    --lilla:       #7c5cbf;
    --lilla-dark:  #5a3d99;
    --lilla-light: #f0ecfa;
    --lilla-mid:   #c4b3e8;
    --bg:          #f7f5fc;
    --border:      #ede8f7;
    --ink:         #1e1b2e;
    --muted:       #8b84a3;
    --danger:      #d6455d;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    display: flex; align-items: center; justify-content: center;
    padding: 22px;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ---- Sfondo: bagliori lilla in lento movimento (atmosfera) ---- */
  .bg-glow { position: fixed; border-radius: 50%; filter: blur(60px); opacity: .55; z-index: 0; pointer-events: none; }
  .bg-glow.g1 { width: 320px; height: 320px; background: var(--lilla-mid);  top: -80px;  left: -60px; }
  .bg-glow.g2 { width: 280px; height: 280px; background: #d9b8ec;           bottom: -90px; right: -70px; }
  .bg-glow.g3 { width: 200px; height: 200px; background: var(--lilla-light); top: 40%; right: 10%; opacity: .7; }

  /* ---- Skyline di Firenze sfumata in basso (firma del luogo) ---- */
  .skyline { position: fixed; left: 0; bottom: 0; width: 100%; height: auto; aspect-ratio: 400 / 150; z-index: 0; pointer-events: none; display: block; }

  /* ---- Uccellini che planano nel cielo sopra la card ---- */
  .bird { position: fixed; left: 0; z-index: 0; color: var(--lilla-dark); pointer-events: none; will-change: transform; opacity: .7; }
  .bird svg { display: block; width: 100%; height: auto; }
  .bird-1 { top: 11%; width: 40px; }
  .bird-2 { top: 6%;  width: 30px; }
  .bird-3 { top: 18%; width: 34px; }
  @media (prefers-reduced-motion: reduce) { .bird { display: none; } }

  /* ---- Card ---- */
  .login-card {
    position: relative; z-index: 1;
    width: 100%; max-width: 372px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 22px;
    overflow: hidden;
    box-shadow: 0 18px 50px rgba(92,61,153,.18), 0 2px 8px rgba(92,61,153,.06);
  }

  /* ---- Banner ---- */
  .login-banner {
    position: relative; height: 152px;
    background: url('https://ollicozyhome-lgtm.github.io/Check-in-Ollis-Corner/banner-checkin.jpg') center/cover, var(--lilla-dark);
  }
  .login-banner .bann-img {
    position: absolute; inset: 0;
    background: inherit;
    transform-origin: center;
  }
  .login-banner .veil {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(30,27,46,.78) 0%, rgba(46,38,73,.30) 55%, rgba(124,92,191,.10) 100%);
  }

  /* ---- Corpo ---- */
  .login-body { padding: 26px 24px 28px; }
  .login-lead { font-size: 13.5px; color: var(--muted); text-align: center; margin: 0 0 20px; }

  .login-err {
    display: none;
    background: #fdf0f2; color: var(--danger);
    border: 1px solid #f6cdd5; border-radius: 11px;
    padding: 11px 12px; font-size: 13px; font-weight: 600;
    text-align: center; margin-bottom: 16px;
    align-items: center; justify-content: center; gap: 8px;
  }
  .login-err.show { display: flex; }

  .field { margin-bottom: 15px; }
  .field label {
    display: block; font-size: 11.5px; font-weight: 700;
    color: var(--muted); letter-spacing: .3px;
    margin-bottom: 6px; padding-left: 2px;
  }
  .input-wrap { position: relative; }
  .input-wrap > i.lead {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--lilla-mid); font-size: 15px; transition: color .2s;
    pointer-events: none;
  }
  .input-wrap input {
    width: 100%; padding: 14px 14px 14px 42px;
    border: 1.6px solid var(--border); border-radius: 12px;
    font-size: 15px; font-family: inherit; color: var(--ink);
    background: #fcfbfe; outline: none;
    transition: border-color .18s, box-shadow .18s, background .18s;
  }
  .input-wrap input::placeholder { color: #c3bdd2; }
  .input-wrap input:focus {
    border-color: var(--lilla);
    background: #fff;
    box-shadow: 0 0 0 4px var(--lilla-light);
  }
  .input-wrap input:focus ~ i.lead { color: var(--lilla); }

  .toggle-eye {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    width: 38px; height: 38px; border: none; background: transparent;
    color: var(--lilla-mid); cursor: pointer; font-size: 15px;
    display: flex; align-items: center; justify-content: center; border-radius: 9px;
  }
  .toggle-eye:active { color: var(--lilla-dark); }

  .login-btn {
    width: 100%; margin-top: 6px; padding: 15px;
    border: none; border-radius: 12px;
    background: linear-gradient(135deg, var(--lilla) 0%, var(--lilla-dark) 100%);
    color: #fff; font-size: 15.5px; font-weight: 700; font-family: inherit;
    letter-spacing: .2px; cursor: pointer;
    box-shadow: 0 8px 20px rgba(92,61,153,.30);
    display: flex; align-items: center; justify-content: center; gap: 9px;
    transition: transform .12s ease, box-shadow .2s ease, filter .2s ease;
  }
  .login-btn:hover { box-shadow: 0 10px 26px rgba(92,61,153,.40); }
  .login-btn:active { transform: scale(.985); }
  .login-btn:disabled { cursor: default; filter: saturate(.9); }
  .login-btn.ok { background: linear-gradient(135deg, #34b27b 0%, #1f8a5e 100%); box-shadow: 0 8px 20px rgba(31,138,94,.32); }

  .spinner { width: 17px; height: 17px; border: 2.5px solid rgba(255,255,255,.45); border-top-color: #fff; border-radius: 50%; }

  .login-foot { text-align: center; margin-top: 16px; font-size: 11.5px; color: var(--muted); }
  .login-foot i { color: var(--lilla-mid); }

  /* nota anteprima (solo in questa demo) */
  .demo-note {
    position: fixed; bottom: 14px; left: 0; right: 0; z-index: 3;
    text-align: center; font-size: 11px; color: var(--muted);
  }
  .demo-note button { background: none; border: none; color: var(--lilla); font-weight: 700; text-decoration: underline; cursor: pointer; font-size: 11px; font-family: inherit; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- Animazioni (disattivate se l'utente preferisce poco movimento) ---- */
  @media (prefers-reduced-motion: no-preference) {
    .bg-glow.g1 { animation: drift1 24s ease-in-out infinite; }
    .bg-glow.g2 { animation: drift2 30s ease-in-out infinite; }
    .bg-glow.g3 { animation: drift3 20s ease-in-out infinite; }
    .login-card  { animation: cardIn .62s cubic-bezier(.22,1,.36,1) both; }
    .login-banner .bann-img { animation: kenburns 18s ease-in-out infinite alternate; }
    .login-lead  { animation: fieldIn .5s ease both .22s; }
    .field.f1    { animation: fieldIn .5s ease both .30s; }
    .field.f2    { animation: fieldIn .5s ease both .38s; }
    .login-btn   { animation: fieldIn .5s ease both .46s; }

    @keyframes drift1 { 50% { transform: translate(40px, 30px) scale(1.12); } }
    @keyframes drift2 { 50% { transform: translate(-34px, -26px) scale(1.1); } }
    @keyframes drift3 { 50% { transform: translate(-30px, 24px) scale(1.18); } }
    @keyframes cardIn { from { opacity: 0; transform: translateY(26px) scale(.965); } to { opacity: 1; transform: none; } }
    @keyframes kenburns { from { transform: scale(1); } to { transform: scale(1.12) translateY(-6px); } }
    @keyframes fieldIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

    .bird-1 { animation: fly1 20s linear 0s   infinite; }
    .bird-2 { animation: fly2 26s linear -9s  infinite; }
    .bird-3 { animation: fly3 17s linear -14s infinite; }
    @keyframes fly1 { from { transform: translate(-16vw, 0); } 50% { transform: translate(48vw, -16px); } to { transform: translate(116vw, 0); } }
    @keyframes fly2 { from { transform: translate(-16vw, 0); } 50% { transform: translate(50vw,  12px); } to { transform: translate(116vw, 0); } }
    @keyframes fly3 { from { transform: translate(-16vw, 0); } 50% { transform: translate(52vw, -10px); } to { transform: translate(116vw, 0); } }
  }
</style>
</head>
<body>

  <div class="bg-glow g1"></div>
  <div class="bg-glow g2"></div>
  <div class="bg-glow g3"></div>

  <svg class="skyline" viewBox="0 0 400 150" preserveAspectRatio="xMidYMax meet" aria-hidden="true">
    <defs>
      <linearGradient id="skyfade" x1="0" y1="1" x2="0" y2="0">
        <stop offset="0"    stop-color="#7c5cbf" stop-opacity="0.85"/>
        <stop offset="0.55" stop-color="#7c5cbf" stop-opacity="0.30"/>
        <stop offset="1"    stop-color="#7c5cbf" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <g fill="url(#skyfade)">
      <rect x="0" y="120" width="34" height="30"/><rect x="30" y="110" width="26" height="40"/><rect x="52" y="124" width="30" height="26"/>
      <rect x="98" y="60" width="22" height="90"/><rect x="90" y="48" width="38" height="13"/>
      <rect x="91" y="43" width="5" height="6"/><rect x="100" y="43" width="5" height="6"/><rect x="109" y="43" width="5" height="6"/><rect x="118" y="43" width="5" height="6"/>
      <rect x="103" y="26" width="12" height="20"/><rect x="104" y="21" width="4" height="6"/><rect x="110" y="21" width="4" height="6"/>
      <rect x="130" y="112" width="24" height="38"/><rect x="152" y="122" width="28" height="28"/><rect x="174" y="106" width="20" height="44"/>
      <rect x="198" y="40" width="22" height="110"/><rect x="195" y="35" width="28" height="6"/>
      <rect x="238" y="88" width="62" height="62"/><path d="M238 88 C236 56 250 33 268 29 C286 33 300 56 300 88 Z"/>
      <rect x="262" y="16" width="12" height="14"/><circle cx="268" cy="12" r="3.4"/>
      <rect x="300" y="116" width="22" height="34"/><rect x="320" y="108" width="26" height="42"/><rect x="344" y="122" width="30" height="28"/>
      <path d="M372 150 C368 108 372 94 376 90 C380 94 384 108 379 150 Z"/><path d="M385 150 C381 116 384 104 387 101 C390 104 393 116 390 150 Z"/>
    </g>
  </svg>

  <div class="bird bird-1"><svg viewBox="0 0 32 14"><path d="M2 12 Q10 2 16 10 Q22 2 30 12" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg></div>
  <div class="bird bird-2"><svg viewBox="0 0 32 14"><path d="M2 12 Q10 2 16 10 Q22 2 30 12" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg></div>
  <div class="bird bird-3"><svg viewBox="0 0 32 14"><path d="M2 12 Q10 2 16 10 Q22 2 30 12" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg></div>

  <div class="login-card">
    <div class="login-banner">
      <div class="bann-img"></div>
      <div class="veil"></div>
    </div>

    <div class="login-body">
      <p class="login-lead">Bentornato — accedi per continuare.</p>

      <div class="login-err" id="loginErr"><i class="fa-solid fa-circle-exclamation"></i><span id="loginErrTxt">Utente o password non corretti.</span></div>

      <div class="field f1">
        <label for="loginUser">Utente</label>
        <div class="input-wrap">
          <i class="fa-solid fa-user lead"></i>
          <input id="loginUser" type="text" autocomplete="username" autocapitalize="none" placeholder="Il tuo utente">
        </div>
      </div>

      <div class="field f2">
        <label for="loginPass">Password</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock lead"></i>
          <input id="loginPass" type="password" autocomplete="current-password" placeholder="La tua password">
          <button class="toggle-eye" type="button" id="eyeBtn" aria-label="Mostra password"><i class="fa-solid fa-eye" id="eyeIcon"></i></button>
        </div>
      </div>

      <button class="login-btn" id="loginBtn"><span id="btnLabel">Accedi</span></button>

      <div class="login-foot"><i class="fa-solid fa-shield-halved"></i> Connessione protetta</div>
    </div>
  </div>

  <div class="demo-note">
    Anteprima dimostrativa · <button onclick="provaErrore()">mostra stato errore</button>
  </div>

<script>
  // --- mostra/nascondi password ---
  var eyeBtn = document.getElementById('eyeBtn');
  var eyeIcon = document.getElementById('eyeIcon');
  var pass = document.getElementById('loginPass');
  eyeBtn.addEventListener('click', function() {
    var show = pass.type === 'password';
    pass.type = show ? 'text' : 'password';
    eyeIcon.className = show ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
    eyeBtn.setAttribute('aria-label', show ? 'Nascondi password' : 'Mostra password');
  });

  // --- Funzionamento del pulsante: caricamento -> successo -> reindirizzamento ---
  var btn = document.getElementById('loginBtn');
  var label = document.getElementById('btnLabel');
  var err = document.getElementById('loginErr');
  
  btn.addEventListener('click', function() {
    if (btn.disabled) return;
    err.classList.remove('show');
    
    // 1. Disabilita il pulsante e mostra il caricamento
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner" style="animation:spin .7s linear infinite"></span><span>Accesso in corso…</span>';
    
    setTimeout(function() {
      // 2. Mostra la spunta verde di successo
      btn.classList.add('ok');
      btn.innerHTML = '<i class="fa-solid fa-check"></i><span>Accesso eseguito</span>';
      
      setTimeout(function() {
        // 3. REINDIRIZZAMENTO AL TUO LINK GOOGLE APPS SCRIPT
        window.location.href = 'https://script.google.com/macros/s/AKfycbwRaKhhaV6CohXtrDJAxKm4DfmZ4F1KLajFyz_Slzc5axY8arSkj_rueQ4AmdzW1P4xJg/exec';
        
      }, 1000); // Attende 1 secondo per far leggere "Accesso eseguito"
    }, 1500); // Finge un caricamento di 1.5 secondi
  });

  // Funzione per testare l'errore (solo per la demo)
  function provaErrore() {
    err.classList.add('show');
    document.getElementById('loginPass').focus();
  }
</script>
</body>
</html>
