<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <title>Olli's Corner</title>

  <!-- ===== Installazione su iPhone (schermata Home, a tutto schermo) ===== -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Olli's Corner">
  <meta name="theme-color" content="#5a3d99">
  <!-- Icona schermata Home: cambia il nome del file se la tua icona si chiama diversamente -->
  <link rel="apple-touch-icon" href="https://ollicozyhome-lgtm.github.io/Check-in-Ollis-Corner/icon-180.png">
  <link rel="icon" href="https://ollicozyhome-lgtm.github.io/Check-in-Ollis-Corner/icon-180.png">

  <style>
    :root { --lilla: #7c5cbf; --lilla-dark: #5a3d99; --bg: #f7f5fc; --border: #ede8f7; --muted: #7a7490; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; width: 100%; overflow: hidden;
      background: var(--bg);
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    }

    /* L'app vera e propria, caricata dentro questa pagina */
    #app {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      border: none; display: block;
      background: var(--bg);
    }

    /* Schermata di caricamento sopra l'app, finché non è pronta */
    #splash {
      position: fixed; inset: 0; z-index: 10;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      transition: opacity .4s ease;
      padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    .ring {
      width: 48px; height: 48px;
      border: 3px solid var(--border); border-top-color: var(--lilla);
      border-radius: 50%; animation: spin .85s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .splash-title { font-size: 17px; font-weight: 700; color: var(--lilla-dark); }
    .splash-sub   { font-size: 13px; color: var(--muted); }

    /* Messaggio di errore se l'app non si carica (mostrato solo come ripiego) */
    #fallback {
      position: fixed; inset: 0; z-index: 20;
      background: var(--bg); display: none;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; text-align: center;
      padding: env(safe-area-inset-top) 28px env(safe-area-inset-bottom);
    }
    #fallback h2 { font-size: 18px; color: var(--lilla-dark); }
    #fallback p  { font-size: 14px; color: var(--muted); line-height: 1.5; max-width: 320px; }
    #fallback a  {
      display: inline-block; margin-top: 6px; padding: 13px 22px;
      background: var(--lilla); color: #fff; text-decoration: none;
      border-radius: 12px; font-weight: 700; font-size: 15px;
    }
  </style>
</head>
<body>
  <script>
    var URL_APP = "https://script.google.com/macros/s/AKfycbwRaKhhaV6CohXtrDJAxKm4DfmZ4F1KLajFyz_Slzc5axY8arSkj_rueQ4AmdzW1P4xJg/exec;
  </script>

  <iframe id="app" title="Olli's Corner" allow="clipboard-read; clipboard-write"></iframe>

  <div id="splash">
    <div class="ring"></div>
    <div class="splash-title">Olli's Corner</div>
    <div class="splash-sub">Apertura in corso…</div>
  </div>

  <div id="fallback">
    <h2>Non riesco ad aprire l'app</h2>
    <p>Controlla che l'indirizzo sia corretto e che la Web App sia distribuita con accesso impostato su <b>"Chiunque"</b>.</p>
    <a id="fallbackLink" href="#" target="_blank" rel="noopener">Apri direttamente</a>
  </div>

  <script>
    (function () {
      var iframe   = document.getElementById('app');
      var splash   = document.getElementById('splash');
      var fallback = document.getElementById('fallback');
      var fbLink   = document.getElementById('fallbackLink');

      // Controllo: l'URL è stato impostato?
      if (!URL_APP || URL_APP.indexOf('https://script.google.com/macros/s/AKfycbwRaKhhaV6CohXtrDJAxKm4DfmZ4F1KLajFyz_Slzc5axY8arSkj_rueQ4AmdzW1P4xJg/exec') !== -1 || URL_APP.indexOf('/exec') === -1) {
        splash.style.display = 'none';
        fallback.style.display = 'flex';
        document.querySelector('#fallback h2').textContent = 'Manca l\u2019indirizzo dell\u2019app';
        document.querySelector('#fallback p').innerHTML =
          'Apri il file <b>app.html</b> e incolla l\u2019URL che finisce con <b>/exec</b> nella riga indicata.';
        fbLink.style.display = 'none';
        return;
      }

      fbLink.href = URL_APP;
      iframe.src  = URL_APP;

      // Nascondi lo splash quando l'app è caricata
      iframe.addEventListener('load', function () {
        splash.classList.add('hidden');
        setTimeout(function () { splash.style.display = 'none'; }, 450);
      });

      // Ripiego: se dopo 12 secondi non si è caricata nulla, mostra il messaggio
      setTimeout(function () {
        if (splash.style.display !== 'none') {
          splash.style.display = 'none';
          fallback.style.display = 'flex';
        }
      }, 12000);
    })();
  </script>

</body>
</html>
